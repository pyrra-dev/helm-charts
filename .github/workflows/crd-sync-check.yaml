---
name: CRD Sync Check
permissions: {}

on:
  pull_request:
    branches:
      - main
    paths:
      - charts/pyrra/Chart.yaml
      - charts/pyrra/crds/**
      - .github/workflows/crd-sync-check.yaml

jobs:
  crd-sync-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Compare CRD against upstream appVersion
        run: |
          set -euo pipefail
          app_version=$(grep '^appVersion:' charts/pyrra/Chart.yaml | awk '{print $2}')
          if [[ -z "$app_version" ]]; then
            echo "Could not read appVersion from charts/pyrra/Chart.yaml" >&2
            exit 1
          fi
          echo "Chart.yaml appVersion: $app_version"

          upstream_url="https://raw.githubusercontent.com/pyrra-dev/pyrra/${app_version}/jsonnet/controller-gen/pyrra.dev_servicelevelobjectives.json"
          echo "Fetching upstream CRD from: $upstream_url"
          curl -fsSL "$upstream_url" -o upstream-crd.json

          if ! diff -u charts/pyrra/crds/servicelevelobjectives.json upstream-crd.json; then
            echo "::error::charts/pyrra/crds/servicelevelobjectives.json is out of sync with pyrra-dev/pyrra@${app_version}. Update it from ${upstream_url}."
            exit 1
          fi
          echo "CRD is in sync with upstream ${app_version}."
