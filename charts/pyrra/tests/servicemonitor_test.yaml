suite: servicemonitor
tests:
  - it: should not render a server ServiceMonitor by default
    templates:
      - templates/servicemonitor-server.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render a server ServiceMonitor when enabled
    templates:
      - templates/servicemonitor-server.yaml
    set:
      serviceMonitor.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceMonitor
      - equal:
          path: spec.endpoints[0].port
          value: http

  - it: should not render an operator ServiceMonitor by default
    templates:
      - templates/servicemonitor-operator.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render an operator ServiceMonitor when enabled
    templates:
      - templates/servicemonitor-operator.yaml
    set:
      serviceMonitorOperator.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceMonitor
