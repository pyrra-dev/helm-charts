suite: serviceaccount
templates:
  - templates/serviceaccount.yaml
tests:
  - it: should render a ServiceAccount by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount

  - it: should not render a ServiceAccount when disabled
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not automount the service account token by default
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should automount the service account token when enabled
    set:
      serviceAccount.automountServiceAccountToken: true
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: true
